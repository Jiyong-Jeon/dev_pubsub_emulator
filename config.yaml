# Dev PubSub Emulator Configuration
project_id: postmath-dev
grpc_port: 8085
web_port: 8086

# Topic-Subscription mapping
# Topics and subscriptions are created automatically on server startup.
# Match these with Go service environment variables.
topics:
  - name: ai-service-request
    subscriptions:
      - ai-service-request-sub          # REQUEST_SUBSCRIPTION_ID
    # No subscriptions: publish-only topic (AI service subscribes)
  - name: ai-service-response
    subscriptions:
      - name: ai-service-response-ags-sub          # RESPONSE_SUBSCRIPTION_ID
        filter: 'attributes.service_name = "ags"'
      - name: ai-service-response-dps-sub          # RESPONSE_SUBSCRIPTION_ID
        filter: 'attributes.service_name = "dps"'
      - name: ai-service-response-cms-sub          # RESPONSE_SUBSCRIPTION_ID
        filter: 'attributes.service_name = "cms"'
  - name: bms2dps
    subscriptions:
      - bms2dps-sub              # BMS2DPS_SUBSCRIPTION_ID
  - name: dps2cms-migration
    subscriptions:
      - dps2cms-migration-sub          # DPS2CMS_MIGRATION_SUBSCRIPTION_ID
